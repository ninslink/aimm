<!doctype html><html><head><meta name='viewport' content='width=device-width,initial-scale=1'><link href='https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&display=swap' rel='stylesheet'><style>body{font-family:Montserrat;margin:0}.layout-group{width:min(82vw,1400px);margin:auto}.collage{display:grid;grid-template-columns:1.4fr .9fr 1fr;gap:22px}.news{display:flex;flex-direction:column}.news-card{position:relative;aspect-ratio:1;margin:10px 0;overflow:hidden}.news-card img,.tile img{width:100%;height:100%;object-fit:cover;filter:grayscale(1)}.overlay{position:absolute;inset:0;background:linear-gradient(transparent,rgba(0,0,0,.7));color:#fff;padding:18px;display:flex;align-items:end}.arrows span{cursor:pointer;color:#B3123F;font-size:24px;padding-right:12px}.footer-right img{height:26px;filter:grayscale(1) brightness(.2);margin:0 18px}.tile:hover img{filter:invert(1) hue-rotate(300deg)}@media(max-width:760px){.collage{grid-template-columns:1fr}.news-card,.tile{aspect-ratio:1}}</style></head><body><div class='layout-group'><section class='collage'><div class='news'><h3 style='color:#B3123F'>NEWS</h3><div class='arrows'><span onclick='move(-1)'>‹</span><span onclick='move(1)'>›</span></div><div id='carousel'></div></div><div class='tile'><img src='assets/images/landing_refined_01.jpg'></div><div class='tile'><img src='assets/images/landing_refined_05.jpg'></div></section><footer class='footer-right'><img src='assets/logos/originals/logo_IRPS.png'><img src='assets/logos/flame.png'><img src='assets/logos/snsf.png'></footer></div><script>const d=[['news1.jpg','TAG'],['news2.jpg','Pilot'],['news3.jpg','Publication']];let i=0;function r(){carousel.innerHTML=`<div class='news-card'><img src='assets/images/${d[i][0]}'><div class='overlay'>${d[i][1]}<br>Read more →</div></div>`}function move(n){i=(i+n+d.length)%d.length;r()}r()</script></body></html>
