<!doctype html><html><head><meta name='viewport' content='width=device-width,initial-scale=1'><link href='https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;600&display=swap' rel='stylesheet'><style>body{font-family:Montserrat;margin:0;background:#fff;color:#111}.layout{width:min(86vw,1450px);margin:auto;padding:40px 0}.grid{display:grid;grid-template-columns:1.6fr 1fr .9fr;gap:28px;align-items:start}.about{aspect-ratio:1.2;background:#f8f8f8;display:flex;align-items:center;justify-content:center;font-size:42px;color:#B3123F}.tile,.news-card,.about{overflow:hidden;border-radius:2px}.tile img,.news-card img{width:100%;height:100%;object-fit:cover;filter:grayscale(1)}.tile{aspect-ratio:1}.tile:hover img{filter:invert(1) hue-rotate(300deg)}h3{font-size:14px;letter-spacing:.2em;color:#B3123F}.news-card{aspect-ratio:1}.overlay{position:absolute;inset:0;background:linear-gradient(transparent,rgba(0,0,0,.75));padding:18px;color:#fff;display:flex;align-items:end}.footer img{height:24px;filter:grayscale(1) brightness(.25);margin-right:26px}@media(max-width:760px){.grid{grid-template-columns:1fr}.about{aspect-ratio:1;font-size:28px}.tile,.news-card{aspect-ratio:1.1}}</style></head><body><div class='layout'><section class='grid'><div><div class='about'>AV</div><h3>ABOUT</h3></div><div><h3>NEWS ‹ ›</h3><div class='news-card' style='position:relative'><img src='assets/images/news1.jpg'><div class='overlay'>TAG meeting<br>Read more →</div></div></div><div><div class='tile'><img src='assets/images/landing_refined_05.jpg'></div><h3>PUBLICATIONS</h3><div class='tile' style='margin-top:20px'><img src='assets/images/landing_refined_01.jpg'></div><h3>RESEARCH</h3></div></section><footer class='footer' style='margin-top:60px'><img src='assets/logos/originals/logo_IRPS.png'><img src='assets/logos/flame.png'><img src='assets/logos/snsf.png'></footer></div></body></html>
