<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>AIMM</title><link href='https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap' rel='stylesheet'><style>body{margin:0;font-family:Montserrat,sans-serif;background:#fff;color:#0F1113}body:before{content:'';position:fixed;inset:0;background:url("assets/logos/av-o_bw@3x.png") center center/58vh no-repeat;opacity:.018;pointer-events:none;z-index:-1}.page-wrap{min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}.hero img{width:min(100vw,1320px)}.hero{margin-bottom:20px}.layout-group{width:min(76vw,1440px);margin:auto}.collage{display:grid;grid-template-columns:.9fr 1fr 1fr;gap:28px}.tile{position:relative;overflow:hidden}.tile img{width:100%;height:100%;object-fit:cover;filter:grayscale(100%);transition:filter .2s}.tile:hover img{filter:grayscale(100%) contrast(1.12) brightness(.65) invert(1) hue-rotate(305deg)}.about{min-height:220px}.research{min-height:430px}.publications,.dashboard{min-height:180px}@media(max-width:1100px){.collage{display:flex;flex-direction:column}}</style></head><body><div class='page-wrap'><div class='layout-group'><a class='hero'><img src='assets/images/header_banner_bw_half.png'></a><section class='collage'><div class='tile about'><img src='assets/images/landing_refined_01.jpg'></div><div class='tile research'><img src='assets/images/landing_refined_03.jpg'></div><div class='tile dashboard'><img src='assets/news/image_01.jpg'></div></section></div></div></body></html>
