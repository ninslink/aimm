<!doctype html><html><head><meta name='viewport' content='width=device-width,initial-scale=1'><link href='https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&display=swap' rel='stylesheet'><style>body{margin:0;font-family:Montserrat}.menu{position:fixed;left:24px;top:24px}.hero{text-align:center;padding:24px}.hero img{height:82px}.wrap{width:min(88vw,1400px);margin:auto}.frame{border:1px solid #ececec;padding:14px;display:grid;grid-template-columns:1.2fr .8fr;gap:14px}.collage{display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:180px 180px;gap:12px}.tile,.newsCard{border:1px solid #eee;position:relative;padding:16px;overflow:hidden}.about{grid-column:1/3;grid-row:1/3}.tile:hover,.newsCard:hover{background:#D12C5B;color:#fff}.tile:hover img,.newsCard:hover img{filter:grayscale(1) invert(1)}.summary{opacity:0;font-size:11px;position:absolute;bottom:44px}.tile:hover .summary,.newsCard:hover .summary{opacity:1}.title{position:absolute;bottom:16px;font-size:24px}.newsPanel{display:grid;grid-template-rows:auto 1fr}.track{display:flex;overflow:hidden}.slide{min-width:100%;display:grid;grid-template-columns:1fr 1fr;gap:10px}.newsCard img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;filter:grayscale(1);z-index:-1}.ar{cursor:pointer;color:#D12C5B;font-size:24px}@media(max-width:760px){.frame,.collage{grid-template-columns:1fr}.about{grid-column:auto;grid-row:auto}}</style></head><body><div class='menu'>ABOUT<br>RESEARCH<br>RESOURCES<br>PEOPLE<br>NEWS</div><div class='hero'><img src='assets/images/header_banner_bw_half.png'></div><div class='wrap'><div class='frame'><div class='collage'><div class='tile about'><div class='summary'>AIMM combines AI, anthropometry and community monitoring.</div><div class='title'>ABOUT</div></div><div class='tile'><div class='title'>RESEARCH</div></div><div class='tile'><div class='title'>RESOURCES</div></div><div class='tile'><div class='title'>PEOPLE</div></div><div class='tile'><div class='title'>DASHBOARD</div></div></div><div class='newsPanel'><div>NEWS <span class='ar' onclick='mv(-1)'>‹</span><span class='ar' onclick='mv(1)'>›</span></div><div class='track' id='t'><div class='slide'><div class='newsCard'><img src='assets/images/news1.jpg'><div class='summary'>TAG planning.</div><div class='title'>TAG</div></div><div class='newsCard'><img src='assets/images/news2.jpg'><div class='summary'>Fieldwork.</div><div class='title'>Pilot</div></div><div class='newsCard'><img src='assets/images/news3.jpg'><div class='summary'>AI updates.</div><div class='title'>Pipeline</div></div><div class='newsCard'><img src='assets/images/news4.jpg'><div class='summary'>Outputs.</div><div class='title'>Publication</div></div></div></div></div></div></div><script>let x=0;function mv(n){x=(x+n+1)%1;document.getElementById('t').scrollLeft=x*300}</script></body></html>
